<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CANB Vocab Test Print</title>
  <style>
    :root {
      --line: #222;
      --bg: #eef1f4;
      --panel: #ffffff;
      --brand: #c2187a;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: #111;
      font-family: "Noto Sans KR", sans-serif;
    }

    body { min-width: 1280px; }

    .app {
      max-width: 1680px;
      margin: 0 auto;
      padding: 18px;
    }

    .topbar {
      background: var(--panel);
      border: 1px solid #d7dde3;
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.06);
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: end;
    }

    .toolbar-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .toolbar-group label {
      font-size: 12px;
      font-weight: 700;
      color: #555;
    }

    .toolbar select,
    .toolbar input[type="checkbox"] {
      font-family: "Noto Sans KR", sans-serif;
    }

    .toolbar select {
      min-width: 92px;
      height: 38px;
      padding: 0 10px;
      border: 1px solid #b7bec6;
      border-radius: 10px;
      background: #fff;
      font-size: 14px;
      font-weight: 700;
    }

    .toolbar-check {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 38px;
      padding: 0 4px;
      font-size: 14px;
      font-weight: 700;
    }

    .toolbar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: 0;
      background: #111;
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary { background: #666; }

    .status {
      font-size: 12px;
      color: #666;
      text-align: right;
      line-height: 1.5;
      white-space: nowrap;
    }

    .preview-wrap {
      overflow: auto;
      max-height: calc(100vh - 48px);
      padding-bottom: 8px;
    }

    .pages {
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }

    .print-page {
      width: 297mm;
      height: 210mm;
      background: #fff;
      box-shadow: 0 8px 28px rgba(0,0,0,0.12);
      position: relative;
      overflow: hidden;
      padding: 7mm 8mm;
      flex: 0 0 auto;
    }

    .print-page::after {
      content: "";
      position: absolute;
      top: 6mm;
      bottom: 6mm;
      left: 50%;
      border-left: 1px dashed #a4a4a4;
      pointer-events: none;
    }

    .page-inner {
      display: grid;
      grid-template-columns: 136.5mm 136.5mm;
      gap: 8mm;
      height: 100%;
      justify-content: center;
    }

    .ticket {
      width: 136.5mm;
      height: 196mm;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .ticket.blank { border: 0; }

    /* ── 헤더: brand-box + info-box(또는 answer-notice) ── */
    .ticket-header {
      display: grid;
      grid-template-columns: 96mm 40.5mm;
      height: 24mm;
      flex: 0 0 auto;
    }

    .brand-box,
    .info-box,
    .main-table,
    .irregular-table {
      border: 1px solid var(--line);
      background: #fff;
    }

    .brand-box {
      display: grid;
      grid-template-columns: 40mm 56mm;
      height: 24mm;
      overflow: hidden;
    }

    .brand-left {
      border-right: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1mm;
      overflow: hidden;
    }

    .logo-image {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .logo-fallback {
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo {
      color: var(--brand);
      font-weight: 900;
      font-size: 14mm;
      line-height: 0.9;
      letter-spacing: -0.8mm;
      white-space: nowrap;
      transform: scaleX(0.94);
    }

    .logo-sub {
      font-size: 3.4mm;
      font-weight: 700;
      color: #444;
      margin-top: 0.6mm;
      white-space: nowrap;
    }

    .title-area {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1.2mm 1.2mm 0.8mm;
      text-align: center;
      overflow: hidden;
    }

    .term {
      font-size: 6mm;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
    }

    .title {
      margin-top: 1.4mm;
      font-size: 8.3mm;
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.08mm;
      white-space: nowrap;
    }

    .title.answer {
      background: #000;
      color: #fff;
      padding: 0.8mm 1.6mm 1mm;
      display: inline-block;
    }

    /* ── 일반 info-box ── */
    .info-box {
      height: 24mm;
      overflow: hidden;
    }

    /* ── 답지 전용 notice-box (info-box 자리에 들어감) ── */
    .notice-box {
      height: 24mm;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .notice-box-text {
      color: #fff;
      text-align: center;
      font-size: 4.4mm;
      font-weight: 900;
      line-height: 1.25;
      padding: 1mm;
    }

    .info-box table,
    .main-table table,
    .irregular-table table {
      width: 100%;
      height: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .info-box td,
    .main-table td,
    .irregular-table td {
      border: 1px solid var(--line);
      vertical-align: middle;
    }

    .info-box td {
      height: 7.7mm;
      padding: 0 1.4mm;
      font-size: 3.8mm;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .center { text-align: center; }

    .meta-line {
      height: 5mm;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 3mm;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 0 0 auto;
      padding: 0 0.8mm;
    }

    .meta-line .meta-left {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta-line .meta-right {
      font-size: 2.6mm;
      font-weight: 600;
      color: #555;
      flex-shrink: 0;
      padding-left: 2mm;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: right;
    }

    .main-table {
      height: 112mm;
      overflow: hidden;
      flex: 0 0 auto;
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .main-table table { height: 100%; }

    .main-table col.num    { width: 8mm; }
    .main-table col.prompt { width: 95mm; }
    .main-table col.answer { width: 22mm; }
    .main-table col.code   { width: 11.5mm; }

    .main-table td,
    .irregular-table td {
      padding: 0.45mm 0.9mm;
      font-size: 3.05mm;
      line-height: 1.05;
      overflow: hidden;
    }

    .main-table td.num,
    .irregular-table td.num {
      text-align: center;
      font-weight: 700;
      white-space: nowrap;
    }

    .main-table td.prompt,
    .main-table td.answer-cell,
    .main-table td.code {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 문제지: 답 칸 비움 */
    .main-table td.answer-cell.question {
      color: transparent;
    }

    /* 답지: 답 칸 볼드 */
    .main-table td.answer-cell.answer-show {
      font-weight: 800;
    }

    .main-table td.code {
      text-align: right;
      font-size: 2.85mm;
      font-weight: 700;
      padding-right: 1mm;
      border-left: 0;
    }

    .main-table tr { height: 5.55mm; }
    .main-table tr:first-child td { border-top: 0; }
    .main-table tr:last-child td  { border-bottom: 0; }
    .main-table td:first-child    { border-left: 0; }
    .main-table td:last-child     { border-right: 0; }

    .section-label {
      height: 4.6mm;
      display: flex;
      align-items: center;
      font-size: 3.05mm;
      font-weight: 800;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .irregular-table {
      height: 28mm;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .irregular-table col.num     { width: 8mm; }
    .irregular-table col.meaning { width: 34mm; }
    .irregular-table col.base    { width: 28mm; }
    .irregular-table col.past    { width: 33mm; }
    .irregular-table col.pp      { width: 33mm; }

    .irregular-table tr { height: 5.4mm; }

    /* 답지 불규칙 답 칸 볼드 */
    .irregular-table td.irr-ans {
      font-weight: 800;
    }

    .blank-fill { width: 100%; height: 100%; }

    @page {
      size: A4 landscape;
      margin: 0;
    }

    @media print {
      html, body {
        width: 297mm;
        background: #fff;
        min-width: 0;
      }

      .app {
        display: block;
        max-width: none;
        padding: 0;
        margin: 0;
      }

      .topbar { display: none !important; }

      .preview-wrap {
        overflow: visible;
        max-height: none;
        padding: 0;
      }

      .pages { display: block; }

      .print-page {
        width: 297mm;
        height: 210mm;
        margin: 0;
        box-shadow: none;
        page-break-after: always;
        break-after: page;
      }

      .print-page:last-child {
        page-break-after: auto;
        break-after: auto;
      }

      .print-page::after { top: 0; bottom: 0; }

      .ticket,
      .ticket-header,
      .brand-box,
      .info-box,
      .notice-box,
      .main-table,
      .irregular-table,
      .meta-line,
      .section-label,
      .main-table table,
      .irregular-table table,
      .main-table tr,
      .irregular-table tr {
        break-inside: avoid;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="toolbar">
        <div class="toolbar-group">
          <label for="termSelect">학기명</label>
          <select id="termSelect">
            <option value="2026 Spring" selected>2026 Spring</option>
          </select>
        </div>
        <div class="toolbar-group">
          <label for="classSelect">반</label>
          <select id="classSelect"></select>
        </div>
        <div class="toolbar-group">
          <label for="roundSelect">회차</label>
          <select id="roundSelect"></select>
        </div>
        <div class="toolbar-group">
          <label for="copyCount">문제지 수</label>
          <select id="copyCount">
            <option value="1">1매</option>
            <option value="2">2매</option>
            <option value="3">3매</option>
            <option value="4">4매</option>
            <option value="5">5매</option>
            <option value="6" selected>6매</option>
            <option value="7">7매</option>
            <option value="8">8매</option>
            <option value="9">9매</option>
            <option value="10">10매</option>
            <option value="11">11매</option>
            <option value="12">12매</option>
          </select>
        </div>
        <div class="toolbar-group">
          <label>답지</label>
          <div class="toolbar-check">
            <input type="checkbox" id="includeAnswer" checked />
            <span>포함</span>
          </div>
        </div>
      </div>

      <div class="toolbar-actions">
        <button id="shuffleBtn">랜덤 재생성</button>
        <button id="printBtn" class="secondary">인쇄</button>
        <div class="status" id="statusText"></div>
      </div>
    </div>

    <div class="preview-wrap">
      <div class="pages" id="pages"></div>
    </div>
  </div>

  <script>
    let vocabRows = [];
    let scheduleRows = [];
    let irregularRows = [];
    let cachedQuestionSet = null;
    let cachedIrregularSet = null;
    let lastSelectedClass = '';
    let lastSelectedRound = '';

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    /* 뜻 여러 개를 최대 3개까지 쉼표로 합침 */
    function shortMeaning(text) {
      return String(text)
        .split(/\s*[;,]\s*/)
        .map(x => x.trim())
        .filter(Boolean)
        .slice(0, 3)
        .join(', ');
    }

    /* ── 수정 1: parseDayList 개선 ──
       "Day 11, 12" → ["Day 11", "Day 12"] 처리 */
    function parseDayList(dayLabel) {
      const raw = String(dayLabel)
        .split(',')
        .map(x => x.trim())
        .filter(Boolean);

      let prefix = 'Day';
      return raw.map(token => {
        const full = token.match(/^(Day)\s*(\d+)$/i);
        if (full) { prefix = full[1]; return full[1] + ' ' + full[2]; }
        const onlyNumber = token.match(/^\d+$/);
        if (onlyNumber) return prefix + ' ' + onlyNumber[0];
        return token;
      });
    }

    function parseVocabTSV(text) {
      return text
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => {
          const cols = line.split('\t');
          return {
            day:     cols[0] || '',
            word:    cols[1] || '',
            meaning: cols[2] || '',
            kind:    cols[3] || '',
            book:    cols[4] || '',
            code:    cols[5] || ''
          };
        })
        .filter(row => row.day && row.word && row.meaning);
    }

    /* ── 수정 2: schedule에 nextDate / nextDayLabel 컬럼 추가 ──
       schedule-data.txt 형식: className\ttestDate\tdayLabel\tbookName\tnextDate\tnextDayLabel
       nextDate, nextDayLabel은 없어도 동작 */
    function parseScheduleTSV(text) {
      const baseRows = text
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => {
          const cols = line.split('\t');
          return {
            className:    cols[0] || '',
            testDate:     cols[1] || '',
            dayLabel:     cols[2] || '',
            bookName:     cols[3] || '',
            nextDate:     cols[4] || '',   // 추가: 다음 시험 날짜
            nextDayLabel: cols[5] || ''    // 추가: 다음 Day 범위
          };
        })
        .filter(row => row.className && row.testDate && row.dayLabel);

      const counters = new Map();
      return baseRows.map(row => {
        const key = row.className + '||' + row.bookName;
        const round = (counters.get(key) || 0) + 1;
        counters.set(key, round);
        return {
          className:    row.className,
          roundLabel:   String(round),
          roundDisplay: String(round) + '회',
          testDate:     row.testDate,
          dayLabel:     row.dayLabel,
          bookName:     row.bookName,
          nextDate:     row.nextDate,
          nextDayLabel: row.nextDayLabel
        };
      });
    }

    function parseIrregularTSV(text) {
      return text
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => {
          const cols = line.split('\t');
          return {
            round:   cols[0] || '',
            base:    cols[1] || '',
            past:    cols[2] || '',
            pp:      cols[3] || '',
            meaning: cols[4] || ''
          };
        })
        .filter(row => row.round && row.base && row.past && row.pp && row.meaning);
    }

    async function loadTextFile(path) {
      const response = await fetch(path, { cache: 'no-store' });
      if (!response.ok) throw new Error(path + ' 로드 실패');
      return response.text();
    }

    async function loadAllData() {
      const [vocabText, scheduleText, irregularText] = await Promise.all([
        loadTextFile('./vocab-data.txt'),
        loadTextFile('./schedule-data.txt'),
        loadTextFile('./irregular-data.txt')
      ]);
      vocabRows     = parseVocabTSV(vocabText);
      scheduleRows  = parseScheduleTSV(scheduleText);
      irregularRows = parseIrregularTSV(irregularText);
    }

    function dedupeWords(rows) {
      const seen = new Set();
      return rows.filter(row => {
        const key = String(row.word).toLowerCase() + '__' + String(row.code);
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function getFilteredVocab(allRows, schedule) {
      const daySet    = new Set(parseDayList(schedule.dayLabel));
      const targetBook = String(schedule.bookName || '').trim();
      return allRows.filter(row => {
        const sameBook = !targetBook || String(row.book || '').trim() === targetBook;
        const sameDay  = daySet.size === 0 || daySet.has(String(row.day || '').trim());
        return sameBook && sameDay;
      });
    }

    /* ── 수정 3: 단어 부족 시 경고 + 가능한 만큼만 사용 ── */
    function buildQuestionSet(rows) {
      const unique = shuffle(dedupeWords(rows));
      const total  = unique.length;
      if (total < 20) {
        console.warn(`단어 수 부족: ${total}개 (최소 20개 필요)`);
      }
      const engCount = Math.min(17, total);
      const korStart = engCount;
      const korCount = Math.min(3, total - korStart);
      return {
        english: unique.slice(0, engCount),
        korean:  unique.slice(korStart, korStart + korCount),
        total
      };
    }

    function buildIrregularSet(rows, roundLabel) {
      const filtered = rows.filter(row => String(row.round).trim() === String(roundLabel).trim());
      return shuffle(filtered).slice(0, 5);
    }

    /* ── 수정 4: classSelect populate 후 roundSelect 갱신 분리 ── */
    function populateClassSelect() {
      const classSelect = document.getElementById('classSelect');
      const classes = [...new Set(scheduleRows.map(row => row.className))];
      classSelect.innerHTML = classes
        .map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`)
        .join('');
      if (classes.includes(lastSelectedClass)) classSelect.value = lastSelectedClass;
      else if (classes.length) classSelect.value = classes[0];
    }

    function populateRoundSelect(selectedClass) {
      const roundSelect = document.getElementById('roundSelect');
      const rows = scheduleRows.filter(row => row.className === selectedClass);
      roundSelect.innerHTML = rows
        .map(row => `<option value="${escapeHtml(row.roundLabel)}">${escapeHtml(row.roundDisplay)}</option>`)
        .join('');
      if (rows.some(row => row.roundLabel === lastSelectedRound)) roundSelect.value = lastSelectedRound;
      else if (rows.length) roundSelect.value = rows[0].roundLabel;
    }

    function getSelectedSchedule() {
      const className  = document.getElementById('classSelect').value;
      const roundLabel = document.getElementById('roundSelect').value;
      return scheduleRows.find(row => row.className === className && row.roundLabel === roundLabel) || null;
    }

    /* ── 수정 5: renderHeader — 답지일 때 info-box 대신 notice-box ──
       info-box의 회차는 roundLabel(숫자만)으로 표시 */
    function renderHeader(meta, answerMode) {
      const rightBox = answerMode
        ? `<div class="notice-box">
             <div class="notice-box-text">불규칙은 전부 다 써야<br>정답처리해주세요</div>
           </div>`
        : `<div class="info-box">
             <table>
               <tbody>
                 <tr>
                   <td class="center">${escapeHtml(meta.className)}</td>
                   <td class="center">${escapeHtml(meta.roundLabel)}</td>
                 </tr>
                 <tr><td class="center">Name</td><td></td></tr>
                 <tr><td class="center">Score</td><td class="center">_______ / 25</td></tr>
               </tbody>
             </table>
           </div>`;

      /* ── 수정 6: meta-line에 NEXT 정보 추가 ── */
      const nextInfo = (meta.nextDate || meta.nextDayLabel)
        ? `NEXT: ${[meta.nextDate, meta.nextDayLabel].filter(Boolean).join(' - ')}`
        : '';

      return `
        <div class="ticket-header">
          <div class="brand-box">
            <div class="brand-left">
              <img class="logo-image" src="./logo.png" alt="CANB English logo"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
              <div class="logo-fallback">
                <div class="logo">CANB</div>
                <div class="logo-sub">CANB English</div>
              </div>
            </div>
            <div class="title-area">
              <div class="term">${escapeHtml(meta.term)}</div>
              <div class="title ${answerMode ? 'answer' : ''}">${answerMode ? 'Answer Key' : 'Vocab Test'}</div>
            </div>
          </div>
          ${rightBox}
        </div>
        <div class="meta-line">
          <span class="meta-left">${escapeHtml(meta.testDate)} · ${escapeHtml(meta.dayLabel)}</span>
          ${nextInfo ? `<span class="meta-right">${escapeHtml(nextInfo)}</span>` : ''}
        </div>
      `;
    }

    /* ── 수정 7: renderMainTable — 답지 prompt/answer 표시 개선 ──
       답지: prompt에 모든 뜻(한국어 여러 개) 표시, answer에 영어 볼드
       문제지: prompt에 뜻 또는 영어, answer 칸 비움 */
    function renderMainTable(questionSet, answerMode) {
      const rows = [
        ...questionSet.english.map(item => ({ type: 'meaning', ...item })),
        ...questionSet.korean.map(item => ({ type: 'word',    ...item }))
      ];

      const body = rows.map((item, idx) => {
        let prompt, answer;

        if (answerMode) {
          /* 답지 */
          if (item.type === 'meaning') {
            /* 한국어 → 영어: prompt=한국어 여러 뜻, answer=영어 단어 */
            prompt = shortMeaning(item.meaning);
            answer = escapeHtml(item.word);
          } else {
            /* 영어 → 한국어: prompt=영어 단어, answer=한국어 뜻(들) */
            prompt = item.word;
            answer = escapeHtml(shortMeaning(item.meaning));
          }
        } else {
          /* 문제지 */
          prompt = item.type === 'meaning' ? item.meaning : item.word;
          answer = '';
        }

        return `
          <tr>
            <td class="num">${idx + 1}</td>
            <td class="prompt">${escapeHtml(String(prompt))}</td>
            <td class="answer-cell ${answerMode ? 'answer-show' : 'question'}">${answer}</td>
            <td class="code">${escapeHtml(item.code)}</td>
          </tr>
        `;
      }).join('');

      return `
        <table>
          <colgroup>
            <col class="num" />
            <col class="prompt" />
            <col class="answer" />
            <col class="code" />
          </colgroup>
          <tbody>${body}</tbody>
        </table>
      `;
    }

    /* ── 수정 8: renderIrregularTable — 답지 답 칸 볼드 클래스 적용 ── */
    function renderIrregularTable(rows, answerMode) {
      const ansClass = answerMode ? 'irr-ans' : '';
      const body = rows.map((item, idx) => `
        <tr>
          <td class="num">${21 + idx}</td>
          <td>${escapeHtml(item.meaning)}</td>
          <td>${escapeHtml(item.base)}</td>
          <td class="${ansClass}">${answerMode ? escapeHtml(item.past) : ''}</td>
          <td class="${ansClass}">${answerMode ? escapeHtml(item.pp)   : ''}</td>
        </tr>
      `).join('');

      return `
        <table>
          <colgroup>
            <col class="num" />
            <col class="meaning" />
            <col class="base" />
            <col class="past" />
            <col class="pp" />
          </colgroup>
          <tbody>${body}</tbody>
        </table>
      `;
    }

    function renderTicket(meta, questionSet, irregularSet, answerMode) {
      return `
        <div class="ticket ${answerMode === null ? 'blank' : ''}">
          ${answerMode === null ? '<div class="blank-fill"></div>' : `
            ${renderHeader(meta, answerMode)}
            <div class="main-table">${renderMainTable(questionSet, answerMode)}</div>
            <div class="section-label">&lt;동사 3단 변화&gt;</div>
            <div class="irregular-table">${renderIrregularTable(irregularSet, answerMode)}</div>
          `}
        </div>
      `;
    }

    function buildSlots(copyCount, includeAnswer) {
      const slots = Array.from({ length: copyCount }, () => 'question');
      if (includeAnswer) slots.push('answer');
      if (slots.length % 2 === 1) slots.push('blank');
      return slots;
    }

    function chunk(array, size) {
      const out = [];
      for (let i = 0; i < array.length; i += size) out.push(array.slice(i, i + size));
      return out;
    }

    function updateStatus(schedule, questionSet, irregularSet, pagesData) {
      document.getElementById('statusText').innerHTML =
        `${escapeHtml(schedule.bookName)}<br>${questionSet.total}단어 · 불규칙 ${irregularSet.length}개 · ${pagesData.length}장`;
    }

    function generate(options = {}) {
      if (!scheduleRows.length) return;

      if (options.resetClass) {
        lastSelectedClass = '';
        lastSelectedRound = '';
      }

      /* ── 수정 9: populate 순서 보장 ── */
      populateClassSelect();
      const currentClass = document.getElementById('classSelect').value;
      populateRoundSelect(currentClass);

      const schedule = getSelectedSchedule();
      if (!schedule) return;

      lastSelectedClass = schedule.className;
      lastSelectedRound = schedule.roundLabel;

      const filteredVocab = getFilteredVocab(vocabRows, schedule);

      if (!cachedQuestionSet || options.reshuffle || options.forceRebuild || options.classChanged || options.roundChanged) {
        cachedQuestionSet = buildQuestionSet(filteredVocab);
      }
      if (!cachedIrregularSet || options.reshuffle || options.forceRebuild || options.roundChanged) {
        cachedIrregularSet = buildIrregularSet(irregularRows, schedule.roundLabel);
      }

      const questionSet  = cachedQuestionSet;
      const irregularSet = cachedIrregularSet;
      const meta = {
        term:         document.getElementById('termSelect').value,
        className:    schedule.className,
        roundLabel:   schedule.roundLabel,
        roundDisplay: schedule.roundDisplay,
        testDate:     schedule.testDate,
        dayLabel:     schedule.dayLabel,
        nextDate:     schedule.nextDate,     // 추가
        nextDayLabel: schedule.nextDayLabel  // 추가
      };

      const copyCount    = Number(document.getElementById('copyCount').value || 1);
      const includeAnswer = document.getElementById('includeAnswer').checked;
      const slots        = buildSlots(copyCount, includeAnswer);
      const pagesData    = chunk(slots, 2);

      const html = pagesData.map(pair => {
        const leftType  = pair[0] || 'blank';
        const rightType = pair[1] || 'blank';
        return `
          <section class="print-page">
            <div class="page-inner">
              ${renderTicket(meta, questionSet, irregularSet, leftType  === 'question' ? false : leftType  === 'answer' ? true : null)}
              ${renderTicket(meta, questionSet, irregularSet, rightType === 'question' ? false : rightType === 'answer' ? true : null)}
            </div>
          </section>
        `;
      }).join('');

      document.getElementById('pages').innerHTML = html;
      updateStatus(schedule, questionSet, irregularSet, pagesData);
    }

    function bindEvents() {
      document.getElementById('classSelect').addEventListener('change', () => {
        lastSelectedClass = document.getElementById('classSelect').value;
        lastSelectedRound = '';
        generate({ classChanged: true, roundChanged: true });
      });

      document.getElementById('roundSelect').addEventListener('change', () => {
        lastSelectedRound = document.getElementById('roundSelect').value;
        generate({ roundChanged: true });
      });

      document.getElementById('copyCount').addEventListener('change',   () => generate());
      document.getElementById('includeAnswer').addEventListener('change', () => generate());
      document.getElementById('termSelect').addEventListener('change',   () => generate());
      document.getElementById('shuffleBtn').addEventListener('click',    () => generate({ reshuffle: true, forceRebuild: true }));
      document.getElementById('printBtn').addEventListener('click',      () => window.print());
    }

    async function init() {
      try {
        await loadAllData();
        bindEvents();
        generate({ forceRebuild: true, resetClass: true });
      } catch (error) {
        document.getElementById('pages').innerHTML =
          '<div style="padding:24px;font-size:18px;font-weight:700;">데이터 파일을 불러오지 못했습니다.</div>';
        document.getElementById('statusText').textContent = error.message;
      }
    }

    init();
  </script>
</body>
</html>
